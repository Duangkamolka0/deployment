name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: go-api

jobs:
  # ------------------------------------------------------------
  # 1) Build & Test
  # ------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run tests
        working-directory: api
        run: go test -mod=vendor ./... -v -race

  # ------------------------------------------------------------
  # 2) Docker Build & Push
  # ------------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 DEBUG (เช็คว่า secret มาจริงไหม)
      - name: Debug username
        run: echo "USERNAME=${{ secrets.DOCKER_USERNAME }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/go-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/go-api:latest

  # ------------------------------------------------------------
  # 3) Deploy to Minikube
  # ------------------------------------------------------------
  deploy:
    name: Deploy to Minikube
    needs: docker-build-push
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ❗ แก้ path ตรงนี้ให้ตรงกับโปรเจคจริง
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/api-deployment.yaml

      - name: Update image
        run: |
          kubectl set image deployment/go-api \
          go-api=${{ secrets.DOCKER_USERNAME }}/go-api:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/go-api --timeout=120s

      - name: Smoke test
        run: |
          NODE_IP=$(minikube ip)
          curl --fail --retry 5 --retry-delay 3 \
          "http://${NODE_IP}:30080/readyz"